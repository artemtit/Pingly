      <img class="brand-logo" src="/static/logo.svg" data-light-src="/static/logo.svg" data-dark-src="/static/logo-dark.svg" height="28" alt="Pingly">
    </a>
    <nav class="legal-nav">
      <a href="/privacy">Конфиденциальность</a>
      <a href="/terms">Соглашение</a>
