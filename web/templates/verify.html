<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#FBFBFD">
  <meta name="robots" content="noindex">
  <title>Подтверждение email — Pingly</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo-mark.svg">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="stylesheet" href="/design-tokens.css?v=2">
  <link rel="stylesheet" href="/static/landing.css?v=18">
</head>
<body>
<div class="auth-page">
  <div class="auth-top"><a href="/"><img src="/static/logo.svg" height="30" alt="Pingly"></a></div>
  <main class="auth-main">
    <div class="auth-card">
      <h1>Подтверди почту</h1>
      <p class="auth-sub">Мы отправили 6-значный код на<br><strong>{{ email }}</strong></p>

      {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
      {% if sent %}<div class="auth-note">Новый код отправлен на почту</div>{% endif %}

      <form class="auth-form" method="post" action="/verify">
        <input type="hidden" name="email" value="{{ email }}">
        <div class="auth-field">
          <label for="code">Код из письма</label>
          <input class="auth-input" type="text" id="code" name="code" required
            inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code"
            placeholder="••••••" style="letter-spacing:8px;text-align:center;font-size:22px;" autofocus>
        </div>
        <button class="lbtn lbtn-primary lbtn-lg" type="submit">Подтвердить</button>
      </form>

      <form method="post" action="/verify/resend" style="margin-top:14px;">
        <input type="hidden" name="email" value="{{ email }}">
        <div class="auth-foot">Не пришёл код? <button type="submit" class="link-inline">Отправить ещё раз</button></div>
      </form>
    </div>
    <div class="auth-legal">
      <a href="/privacy">Политика конфиденциальности</a> ·
      <a href="/terms">Пользовательское соглашение</a> ·
      <a href="/contacts">Контакты</a>
    </div>
  </main>
</div>
{% include "partials/analytics.html" %}
</body>
</html>
