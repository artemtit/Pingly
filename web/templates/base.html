<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pingly</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo-mark.svg">
  <link rel="apple-touch-icon" href="/static/logo-mark.svg">
  <link rel="stylesheet" href="/design-tokens.css?v=2">
  <link rel="stylesheet" href="/static/app.css?v=42">
  <link rel="stylesheet" href="/static/tour.css?v=2">
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
      try { if (localStorage.getItem('pingly_sb') === '1') document.documentElement.classList.add('sb-collapsed'); } catch (e) {}
    }());
  </script>
  <!-- app.js loads synchronously: page inline scripts rely on window.pingly -->
  <script src="/static/app.js?v=1"></script>
</head>
<body>
{% block body %}{% endblock %}
<script>
(function(){
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    document.querySelectorAll('.brand-logo').forEach(function(img){
      img.src = t === 'dark' ? img.dataset.darkSrc : img.dataset.lightSrc;
    });
    document.querySelectorAll('.theme-toggle').forEach(function(b){
      b.textContent = t === 'dark' ? '☀️' : '🌙';
      b.title = t === 'dark' ? 'Светлая тема' : 'Тёмная тема';
    });
  }
  window.toggleTheme = function() {
    var cur = document.documentElement.getAttribute('data-theme');
    setTheme(cur === 'dark' ? 'light' : 'dark');
  };
  var saved = localStorage.getItem('theme');
  setTheme(saved || 'light');
}());
</script>
<script>window.PINGLY_ROLE = "{{ user.role if user is defined and user else '' }}";</script>
<script src="/static/tour.js?v=1"></script>
</body>
</html>
