<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pingly</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo-mark.svg">
  <link rel="apple-touch-icon" href="/static/logo-mark.svg">
  <link rel="stylesheet" href="/design-tokens.css?v=2">
  <link rel="stylesheet" href="/static/app.css?v=68">
  <link rel="stylesheet" href="/static/tour.css?v=3">
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
      try { if (localStorage.getItem('pingly_sb') === '1') document.documentElement.classList.add('sb-collapsed'); } catch (e) {}
    }());
  </script>
  <!-- app.js loads synchronously: page inline scripts rely on window.pingly -->
  <script src="/static/app.js?v=6"></script>
</head>
<body>
{% block body %}{% endblock %}
<script>
(function(){
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    document.querySelectorAll('.brand-logo').forEach(function(img){
      img.src = t === 'dark' ? img.dataset.darkSrc : img.dataset.lightSrc;
    });
    var MOON = '<svg class="ic" aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>';
    var SUN = '<svg class="ic" aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>';
    document.querySelectorAll('.theme-toggle').forEach(function(b){
      b.innerHTML = t === 'dark' ? SUN : MOON;
      b.title = t === 'dark' ? 'Светлая тема' : 'Тёмная тема';
    });
  }
  window.toggleTheme = function() {
    var cur = document.documentElement.getAttribute('data-theme');
    setTheme(cur === 'dark' ? 'light' : 'dark');
  };
  var saved = localStorage.getItem('theme');
  setTheme(saved || 'light');
}());
</script>
<script>window.PINGLY_ROLE = "{{ user.role if user is defined and user else '' }}";</script>
<script src="/static/tour.js?v=3"></script>
</body>
</html>
